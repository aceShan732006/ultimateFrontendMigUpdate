<div class="designer-container" (mousemove)="onMouseMove($event)" (mouseup)="onMouseUp()">
  <div class="canvas-wrapper full-canvas">
      <svg width="2000" height="2000" class="workflow-svg">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
          </marker>
        </defs>

        <!-- Connections -->
        <path *ngFor="let conn of connections" [attr.d]="getConnectionPath(conn)" class="connection-line" marker-end="url(#arrowhead)"></path>

        <!-- Nodes -->
        <g *ngFor="let node of nodes"
          [attr.transform]="'translate(' + node.x + ',' + node.y + ')'"
          class="node-group"
          (mousedown)="onNodeMouseDown($event, node)">
          <rect width="200" height="60" rx="8" [attr.fill]="getNodeColor(node.type)"></rect>
          <text x="100" y="35" text-anchor="middle" fill="white" class="node-label">{{ node.label }}</text>
          <!-- Complex decorative elements to increase SVG complexity -->
          <circle cx="10" cy="10" r="4" fill="rgba(255,255,255,0.3)"></circle>
          <circle cx="190" cy="10" r="4" fill="rgba(255,255,255,0.3)"></circle>
          <line x1="10" y1="50" x2="190" y2="50" stroke="rgba(255,255,255,0.2)" stroke-dasharray="2,2"></line>
        </g>
      </svg>
    </div>
